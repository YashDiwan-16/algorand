<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#f9fafb" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e40af">Consent Management Process Flow</text>
  
  <!-- Flow Steps - Horizontal Timeline -->
  <g>
    <!-- Timeline Line -->
    <line x1="100" y1="180" x2="700" y2="180" stroke="#d1d5db" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Step 1: User Registration -->
    <g transform="translate(100, 180)">
      <circle cx="0" cy="0" r="20" fill="#bfdbfe" stroke="#3b82f6" stroke-width="3"/>
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#1e40af">1</text>
      
      <rect x="-75" y="40" width="150" height="100" rx="10" ry="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">User Registration</text>
      
      <text x="0" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1f2937">
        <tspan x="0" dy="0">Connect Wallet</tspan>
        <tspan x="0" dy="16">Aadhaar Verification</tspan>
        <tspan x="0" dy="16">DigiLocker Access</tspan>
      </text>
    </g>
    
    <!-- Step 2: Grant Consent -->
    <g transform="translate(300, 180)">
      <circle cx="0" cy="0" r="20" fill="#a7f3d0" stroke="#10b981" stroke-width="3"/>
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#065f46">2</text>
      
      <rect x="-75" y="40" width="150" height="100" rx="10" ry="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#065f46">Grant Consent</text>
      
      <text x="0" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1f2937">
        <tspan x="0" dy="0">Select Documents</tspan>
        <tspan x="0" dy="16">Set Expiry Time</tspan>
        <tspan x="0" dy="16">Mint Consent NFT</tspan>
      </text>
    </g>
    
    <!-- Step 3: Verification -->
    <g transform="translate(500, 180)">
      <circle cx="0" cy="0" r="20" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="3"/>
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#5b21b6">3</text>
      
      <rect x="-75" y="40" width="150" height="100" rx="10" ry="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#5b21b6">Verification</text>
      
      <text x="0" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1f2937">
        <tspan x="0" dy="0">Institution Checks NFT</tspan>
        <tspan x="0" dy="16">ZK Proof Generation</tspan>
        <tspan x="0" dy="16">Access Documents</tspan>
      </text>
    </g>
    
    <!-- Step 4: Revocation -->
    <g transform="translate(700, 180)">
      <circle cx="0" cy="0" r="20" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#b91c1c">4</text>
      
      <rect x="-75" y="40" width="150" height="100" rx="10" ry="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
      <text x="0" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#b91c1c">Revocation</text>
      
      <text x="0" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1f2937">
        <tspan x="0" dy="0">Burn NFT (Permanent)</tspan>
        <tspan x="0" dy="16">Freeze NFT (Temporary)</tspan>
        <tspan x="0" dy="16">ZK Revocation</tspan>
      </text>
    </g>
  </g>
  
  <!-- Detail Section - NFT Consent Token -->
  <g transform="translate(400, 340)">
    <rect x="-300" y="0" width="600" height="120" rx="10" ry="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#92400e">Consent NFT Token Structure</text>
    
    <!-- NFT Structure -->
    <g transform="translate(-240, 70)">
      <rect x="0" y="-25" width="480" height="50" rx="5" ry="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      
      <!-- Document Hash -->
      <rect x="10" y="-15" width="100" height="30" rx="3" ry="3" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
      <text x="60" y="0" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#92400e">Document Hash</text>
      
      <!-- Expiry Date -->
      <rect x="120" y="-15" width="100" height="30" rx="3" ry="3" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
      <text x="170" y="0" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#92400e">Expiry Date</text>
      
      <!-- Access Permissions -->
      <rect x="230" y="-15" width="100" height="30" rx="3" ry="3" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
      <text x="280" y="0" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#92400e">Access Permissions</text>
      
      <!-- Institution Address -->
      <rect x="340" y="-15" width="130" height="30" rx="3" ry="3" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
      <text x="405" y="0" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#92400e">Institution Address</text>
    </g>
  </g>
  
  <!-- Decorative Elements - Blockchain Nodes -->
  <g>
    <circle cx="120" cy="30" r="8" fill="#dbeafe" opacity="0.5"/>
    <circle cx="150" cy="25" r="5" fill="#dbeafe" opacity="0.5"/>
    <circle cx="170" cy="40" r="7" fill="#dbeafe" opacity="0.5"/>
    
    <circle cx="680" cy="35" r="8" fill="#dbeafe" opacity="0.5"/>
    <circle cx="650" cy="30" r="5" fill="#dbeafe" opacity="0.5"/>
    <circle cx="630" cy="45" r="7" fill="#dbeafe" opacity="0.5"/>
    
    <circle cx="50" cy="460" r="8" fill="#dbeafe" opacity="0.5"/>
    <circle cx="80" cy="470" r="5" fill="#dbeafe" opacity="0.5"/>
    <circle cx="30" cy="480" r="7" fill="#dbeafe" opacity="0.5"/>
    
    <circle cx="750" cy="460" r="8" fill="#dbeafe" opacity="0.5"/>
    <circle cx="720" cy="470" r="5" fill="#dbeafe" opacity="0.5"/>
    <circle cx="770" cy="480" r="7" fill="#dbeafe" opacity="0.5"/>
  </g>
  
  <!-- Connection Arrows -->
  <g>
    <path d="M125,180 L275,180" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    <path d="M325,180 L475,180" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    <path d="M525,180 L675,180" stroke="#d1d5db" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  </g>
  
  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L2,5 Z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg> 